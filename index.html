<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-wdith, initial-scale=1.0">

    <title>Friendly Pairs</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <header>
        <h1>Friendly Pairs</h1>

        <nav>
            <a href="#game">Play</a>
            <a href="#instructions">How To Play</a>
            <a href="#about">About</a>
        </nav>
    </header>

        <main>

        <section id="game">
            <h2>Choose Your Game</h2>
        </section>

        <div class="controls">

            <label>
                Theme:
                <select>
                    <option>Animals</option>
                    <option>Numbers</option>
                    <option>Colours</option>
                </select>
            </label>

            <label>
                Difficulty:
                <select>
                    <option>Easy - 8 Cards</option>
                    <option>Medium - 12 Cards</option>
                    <option>Hard - 16 Cards</option>
                </select>
            </label>
        </div>

        <p>
            Moves:
            <span>0</span>
        </p>

        <p id="message">Choose your game settings</p>

        <div id="board">
            <button class="card">?</button>
            <button class="card">?</button>
            <button class="card">?</button>
            <button class="card">?</button>
            <button class="card">?</button>
            <button class="card">?</button>
            <button class="card">?</button>
            <button class="card">?</button>
        </div>

        <section id="instructions">

            <h2>How To Play</h2>

            <p>Find matching pairs by selecting two cards</p>

        </section>

        <section id="about">

            <h2>About Friendly Pairs</h2>

            <p>An accessible memory game designed for children and SEND learners</p>
            
        </section>

        </main>
</body>

</html>
